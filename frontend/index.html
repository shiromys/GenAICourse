<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />

  <!-- Base SEO — overridden per-page by react-helmet-async -->
  <title>GenAI Course — Learn Generative AI Online with Certification</title>
  <meta name="description"
    content="Master Generative AI with expert-led online courses. Get certified, boost your career, and learn AI for beginners to advanced. Job-ready AI courses with certification — genaicourse.io" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://genaicourse.io/" />

  <!-- OpenGraph base -->
  <meta property="og:site_name" content="GenAI Course" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://genaicourse.io/" />
  <meta property="og:title" content="GenAI Course — Learn Generative AI Online with Certification" />
  <meta property="og:description"
    content="Master Generative AI with expert-led online courses. Get certified, boost your career, and learn AI for beginners to advanced." />
  <meta property="og:image" content="https://genaicourse.io/logo-large.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter base -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@genaicourse" />
  <meta name="twitter:title" content="GenAI Course — Learn Generative AI Online with Certification" />
  <meta name="twitter:description"
    content="Master Generative AI with expert-led online courses. Get certified and advance your career." />
  <meta name="twitter:image" content="https://genaicourse.io/logo-large.png" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Organisation JSON-LD (global, on every page) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "GenAI Course",
    "alternateName": "GenAI Course by Shiro Technologies LLC",
    "url": "https://genaicourse.io",
    "logo": "https://genaicourse.io/logo.png",
    "image": "https://genaicourse.io/logo-large.png",
    "description": "GenAI Course offers expert-led generative AI courses online with certification. Learn AI, machine learning, and automation for career growth.",
    "telephone": "+18009718013",
    "email": "info@genaicourse.io",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "5080 Spectrum Drive, Suite 575E",
      "addressLocality": "Addison",
      "addressRegion": "TX",
      "postalCode": "75001",
      "addressCountry": "US"
    },
    "sameAs": [
      "https://genaicourse.io"
    ],
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Generative AI Online Courses",
      "itemListElement": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Course",
            "name": "Generative AI Courses Online"
          }
        }
      ]
    }
  }
  </script>

  <!-- WebSite JSON-LD with Sitelinks Searchbox -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "GenAI Course",
    "url": "https://genaicourse.io",
    "description": "Learn Generative AI Online with Certification",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://genaicourse.io/courses?search={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
