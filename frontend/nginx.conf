server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # ── SEO: serve robots.txt directly ──────────────────────────────────
    location = /robots.txt {
        add_header Content-Type text/plain;
        try_files $uri =404;
        access_log off;
    }

    # ── SEO: sitemap is served by Express backend via /api proxy ─────────
    # (sitemap.xml is generated dynamically by seoController.js)
    # If your frontend is decoupled, proxy /sitemap.xml to the backend:
    # location = /sitemap.xml {
    #     proxy_pass http://backend:5000/sitemap.xml;
    #     proxy_set_header Host $host;
    # }

    # ── Handle client-side routing (React Router) ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SEO + Security headers ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"                always;
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-XSS-Protection "1; mode=block"            always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
# Block common WordPress exploit probes
location ~* ^/(wp-admin|wp-login|xmlrpc\.php|wp-config\.php) {
    return 444;  # Drop connection silently
}